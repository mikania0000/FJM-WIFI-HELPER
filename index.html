                        {/* 分頁切換器 (Tabs) */}
                        <div className="flex space-x-3 mb-10 bg-slate-200/50 p-2 rounded-2xl w-full max-w-lg mx-auto">
                            <button 
                                onClick={() => setActiveTab('query')} 
                                className={`flex-1 py-4 px-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-all ${activeTab === 'query' ? 'bg-white text-blue-600 shadow-md' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                <Icons.Search /> 查詢密碼
                            </button>
                            <button 
                                onClick={() => setActiveTab('tutorial')} 
                                className={`flex-1 py-4 px-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-all ${activeTab === 'tutorial' ? 'bg-white text-blue-600 shadow-md' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                <Icons.Smartphone /> 安裝教學
                            </button>
                        </div>

                        {/* =========================================================
                            Tab 1: 查詢密碼面板 (主畫面)
                        ========================================================= */}
                        {activeTab === 'query' && (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-white rounded-[3rem] p-8 md:p-12 border border-slate-200 shadow-xl relative min-h-[60vh]">
                                    
                                    {/* 巨大搜尋框 */}
                                    <div className="mb-12 max-w-3xl mx-auto">
                                        <div className="relative group">
                                            <div className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors">
                                                <Icons.Search />
                                            </div>
                                            <input 
                                                type="text" 
                                                placeholder="輸入班級或代號搜尋 (例如: 802班, 保健中心)..." 
                                                className="w-full pl-16 pr-6 py-6 rounded-2xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 focus:bg-white outline-none font-black text-xl transition-all shadow-inner placeholder:font-bold placeholder:text-slate-400 text-slate-800"
                                                value={searchTerm} 
                                                onChange={e=>setSearchTerm(e.target.value)} 
                                                autoFocus
                                            />
                                        </div>
                                    </div>

                                    {/* 錯誤警告區塊 */}
                                    {fetchError && !loading && (
                                        <div className="mb-10 max-w-3xl mx-auto bg-red-50 border border-red-200 p-5 rounded-2xl flex items-start gap-4 animate-in fade-in">
                                            <div className="text-red-500 shrink-0 w-6 h-6 mt-1"><Icons.TriangleAlert /></div>
                                            <div>
                                                <p className="text-lg font-bold text-red-800 mb-2">離線模式</p>
                                                <p className="text-base text-red-600 leading-relaxed font-medium">{fetchError}</p>
                                            </div>
                                        </div>
                                    )}

                                    {/* 狀態指示 */}
                                    {loading ? (
                                        <div className="py-32 text-center text-blue-500 font-bold animate-pulse flex flex-col items-center gap-6">
                                            <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center"><Icons.Cloud /></div>
                                            <span className="text-2xl">正在連接雲端資料庫...</span>
                                        </div>
                                    ) : (
                                        <div>
                                            <div className="flex justify-between items-end mb-8 border-b border-slate-100 pb-5">
                                                <p className="text-xl font-black text-slate-800 flex items-center gap-3">
                                                    <Icons.BookOpen /> 全校節點列表
                                                </p>
                                                <p className="text-base text-slate-500 font-bold bg-slate-100 px-4 py-2 rounded-xl">共 {filteredData.length} 筆</p>
                                            </div>
                                            
                                            {/* 名單 Grid (含複製按鈕) */}
                                            {filteredData.length > 0 ? (
                                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                                    {filteredData.map(i => {
                                                        const currentId = i.s || i.ssid;
                                                        const isCopied = copiedPwdId === currentId;
                                                        const pwdText = i.p || "尚未讀取";
                                                        const canCopy = pwdText !== "尚未同步" && pwdText !== "無資料";

                                                        return (
                                                            <div key={currentId} className="bg-slate-50 border border-slate-100 rounded-[2rem] p-6 hover:bg-white hover:border-blue-300 hover:shadow-xl transition-all group flex flex-col justify-between">
                                                                <div className="flex justify-between items-center mb-5">
                                                                    <span className="text-base font-black text-blue-600 bg-blue-100 px-4 py-1.5 rounded-lg tracking-widest">{i.c || i.classroom}</span>
                                                                    <span className="text-xl font-black text-slate-400 group-hover:text-blue-500 transition-colors font-mono">{currentId}</span>
                                                                </div>
                                                                <div className="bg-white border border-slate-200 p-4 rounded-2xl flex justify-between items-center">
                                                                    <div>
                                                                        <p className="text-sm font-black text-slate-400 mb-2 uppercase tracking-widest">Password</p>
                                                                        <p className={`font-mono text-3xl font-black tracking-tight py-1 ${canCopy ? 'text-slate-800' : 'text-slate-300'}`}>
                                                                            {pwdText}
                                                                        </p>
                                                                    </div>
                                                                    
                                                                    {/* 獨立複製按鈕 */}
                                                                    {canCopy && (
                                                                        <button 
                                                                            onClick={() => handleCopyPassword(pwdText, currentId)}
                                                                            className={`p-4 rounded-xl flex items-center justify-center transition-all active:scale-90 ${isCopied ? 'bg-green-100 text-green-600' : 'bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white'}`}
                                                                            title="複製密碼"
                                                                        >
                                                                            {isCopied ? <Icons.Check /> : <Icons.Copy />}
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ) : (
                                                <div className="py-24 text-center text-slate-400 font-black border-4 border-dashed border-slate-50 rounded-[3rem]">
                                                    <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.HelpCircle /></div>
                                                    <span className="text-2xl">找不到符合的班級或代號</span>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* =========================================================
                            Tab 2: 教學面板
                        ========================================================= */}
                        {activeTab === 'tutorial' && (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                {/* 英雄區塊 */}
                                <section className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-[3rem] p-10 md:p-14 text-white mb-10 shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-80 h-80 opacity-10 translate-x-1/4 -translate-y-1/4"><Icons.Database /></div>
                                    <div className="relative z-10">
                                        <span className="bg-white/20 px-4 py-1.5 rounded-full text-sm font-bold uppercase tracking-widest mb-6 inline-block border border-white/30 backdrop-blur-sm">
                                            在其它網頁也能查密碼
                                        </span>
                                        <h2 className="text-4xl md:text-5xl font-black mb-8 tracking-tight leading-tight">
                                            將查詢工具<br />安裝到手機書籤。
                                        </h2>
                                        <p className="text-blue-100 text-xl mb-10 font-medium opacity-90 max-w-xl leading-relaxed">
                                            複製下方代碼並存為書籤。未來在任何網頁點擊該書籤，都能瞬間喚出密碼查詢面板！
                                        </p>
                                        <button onClick={handleCopyBookmarklet} className={`w-full sm:w-auto px-10 py-6 rounded-[1.5rem] font-black text-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-4 ${copiedBM ? 'bg-green-500' : 'bg-white text-blue-600 hover:bg-blue-50'}`}>
                                            {copiedBM ? <Icons.Check /> : <Icons.Zap />}
                                            {copiedBM ? '啟動碼已複製！去更新書籤吧' : '複製外掛啟動碼'}
                                        </button>
                                    </div>
                                </section>

                                {/* 手機安裝引導 & 問題排解 */}
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="bg-slate-900 rounded-[2.5rem] p-10 text-white shadow-xl">
                                        <h3 className="text-3xl font-black mb-8 flex items-center gap-3"><Icons.Smartphone className="text-blue-400 w-10 h-10" /> 安裝三步驟</h3>
                                        <div className="space-y-8 text-lg opacity-90 font-medium">
                                            <div className="flex gap-5 items-start">
                                                <b className="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center flex-shrink-0 font-black shadow-lg shadow-blue-500/30">1</b>
                                                <p className="pt-1.5 text-slate-300">點擊上方按鈕複製代碼，接著在手機瀏覽器隨便將一個網頁「加入收藏(書籤)」。</p>
                                            </div>
                                            <div className="flex gap-5 items-start">
                                                <b className="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center flex-shrink-0 font-black shadow-lg shadow-blue-500/30">2</b>
                                                <p className="pt-1.5 text-slate-300">去編輯剛剛存好的書籤：名稱改為「啟動」，<u className="text-yellow-400 font-bold decoration-2 underline-offset-4">網址全部刪除並貼上新代碼</u>。</p>
                                            </div>
                                            <div className="flex gap-5 items-start">
                                                <b className="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center flex-shrink-0 font-black shadow-lg shadow-indigo-500/30">3</b>
                                                <p className="pt-1 text-slate-300">
                                                    現在，打開 <a href="https://wifi-auth.kh.edu.tw/qrcode_searching" target="_blank" className="text-indigo-400 font-bold underline underline-offset-4 hover:text-indigo-300 transition-colors">教育局網頁 <Icons.ExternalLink /></a>（或任何網頁）並點擊該書籤，查詢面板就會彈出來！
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-amber-50 rounded-[2.5rem] p-10 border-2 border-amber-100 flex flex-col justify-center shadow-md">
                                        <div className="w-20 h-20 bg-amber-200 text-amber-700 rounded-2xl flex items-center justify-center mb-8"><Icons.Cloud /></div>
                                        <h3 className="text-3xl font-black text-amber-900 mb-6">還有漏掉的密碼？</h3>
                                        <p className="text-xl text-amber-800 leading-relaxed font-medium mb-8">
                                            如果在查詢頁面看到有班級顯示「尚未讀取」或「無資料」，這代表資料庫還沒抓到它。
                                        </p>
                                        <div className="bg-white p-6 rounded-2xl border border-amber-200">
                                            <p className="text-lg font-bold text-slate-700">解決方法：</p>
                                            <p className="text-base text-slate-500 mt-3 leading-relaxed">請打開您的 <a href="https://docs.google.com/spreadsheets/d/1LomQabtIlrmMnT0TxKCAectvxiINlMDnEc6QvZCEMbk/edit" target="_blank" className="text-blue-600 font-bold hover:underline">Google 試算表</a>，點擊上方選單的 <b>「📡 FJM 工具」</b> &gt; <b>「🔍 慢速補齊缺失的密碼」</b>，它會幫您自動重新抓取補齊。</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
