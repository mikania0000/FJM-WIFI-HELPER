            // 初始化與自動載入資料

(),className:"text-slate-400 font-bold p-2 text-xs hover:bg-slate-200 rounded-lg"},"關閉 ✕"))),e('input',{className:"w-full p-4 rounded-2xl border-2 mb-6 shadow-sm outline-none focus:border-blue-500",placeholder:"快速搜尋班級...",value:s,onChange:e=>setS(e.target.value)}),e('div',{className:"grid gap-4 md:grid-cols-2 font-sans"},f.map(i=>e('div',{key:i.s,className:"p-5 bg-white rounded-[2rem] border shadow-sm"},e('span',{className:"text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full"},i.c),e('h3',{className:"text-lg font-black mt-1 text-slate-800 font-mono"},i.s),e(P,{s:i.s})))))};const P=({s})=>{const[p,setP]=useState('讀取中...');useEffect(()=>{let m=true;fetch('/api/qrcode_searching?ssid='+s).then(r=>r.json()).then(j=>{if(m&&j.success&&j.data.length>0)setP(j.data[0].ss_password.replace(/(.{4})/g,'$1 ').trim())});return()=>m=false},[s]);return e('div',{className:"mt-3 bg-slate-50 p-3 rounded-xl border border-slate-100 font-sans"},e('p',{className:"text-[10px] text-slate-400 font-bold uppercase"},"Wifi Password"),e('p',{className:"font-mono text-lg font-bold text-slate-900 tracking-tight"},p))};ReactDOM.createRoot(rootDiv).render(e(App))})()`;
                return `javascript:void(${coreScript})`;
            }, [data]);

            // 複製到剪貼簿
            const handleCopy = () => {
                const ta = document.createElement("textarea");
                ta.value = bookmarkletCode;

            // 產生分享連結
            const handleShare = () => {

                        <div className="flex items-center gap-3">
                            <Icons.Wifi />
                            <h1 className="text-xl font-black text-slate-800 tracking-tighter hidden sm:block uppercase">FJM Helper</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setIsImportModalOpen(true)} className="p-2.5 bg-slate-100 rounded-xl hover:text-blue-600 transition-all shadow-sm" title="從 Excel 匯入"><Icons.Upload /></button>
                            <button onClick={handleShare} className="p-2.5 bg-slate-100 rounded-xl hover:text-indigo-600 transition-all shadow-sm" title="分享目前清單"><Icons.Share2 /></button>
                            <a href="https://github.com" target="_blank" className="p-2.5 bg-slate-900 text-white rounded-xl hover:scale-105 transition-all shadow-sm"><Icons.Github /></a>
                        </div>
                    </nav>

                    <main className="w-full max-w-4xl px-6 py-12">
                        {/* 英雄區塊：複製代碼 */}
                        <section className="bg-blue-600 rounded-[3rem] p-10 text-white mb-16 shadow-2xl relative overflow-hidden group">
                            <div className="absolute top-0 right-0 w-64 h-64 opacity-5 translate-x-1/4 -translate-y-1/4 group-hover:rotate-12 transition-transform duration-1000"><Icons.Zap /></div>
                            <div className="relative z-10">
                                <h2 className="text-4xl md:text-5xl font-black mb-6 tracking-tight leading-none italic underline decoration-blue-400">
                                    一鍵同步<br />校外也能查。
                                </h2>
                                <p className="text-blue-100 text-lg mb-10 font-medium opacity-90">
                                    代碼已自動綁定您的 Google 試算表（共 {data.length} 個班級）。存入書籤後，就能在教育局官網一鍵抓取並推送到雲端。
                                </p>
                                <button onClick={handleCopy} className={`w-full sm:w-auto px-10 py-5 rounded-[1.5rem] font-black text-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-4 ${copied ? 'bg-green-500' : 'bg-white text-blue-600 hover:bg-blue-50'}`}>
                                    {copied ? <Icons.Check /> : <Icons.Zap />}
                                    {copied ? '啟動碼已複製！' : '複製最新啟動碼'}
                                </button>
                                {copied && (
                                    <a href="https://wifi-auth.kh.edu.tw/qrcode_searching" target="_blank" className="inline-flex items-center gap-2 mt-6 animate-bounce font-black text-blue-100 border-b-2 border-blue-300 hover:text-white pb-1">
                                        馬上前往教育局官網執行 ➔
                                    </a>
                                )}
                            </div>
                        </section>

                        <div className="grid md:grid-cols-2 gap-8 mb-16">
                            {/* 手機安裝引導 */}
                            <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-xl border border-slate-800">
                                <h3 className="text-xl font-black mb-6 flex items-center gap-3"><Icons.Smartphone /> 操作三步驟</h3>
                                <div className="space-y-6 text-sm opacity-90">
                                    <div className="flex gap-4">
                                        <b className="w-7 h-7 bg-blue-500 rounded-lg flex items-center justify-center flex-shrink-0 font-black shadow-lg shadow-blue-500/20 text-xs">1</b>
                                        <p>點擊上方按鈕，隨便將任何網頁「加入收藏」。</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <b className="w-7 h-7 bg-blue-500 rounded-lg flex items-center justify-center flex-shrink-0 font-black shadow-lg shadow-blue-500/20 text-xs">2</b>
                                        <p>去編輯該書籤：名稱改為「啟動」，<u className="text-yellow-400 font-bold decoration-2">將網址全部刪除並貼上</u>剛剛複製的代碼。</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <b className="w-7 h-7 bg-indigo-500 rounded-lg flex items-center justify-center flex-shrink-0 font-black shadow-lg shadow-indigo-500/20 text-xs">3</b>
                                        <p>在學校內打開教育局官網，點擊該書籤，然後按下畫面上的 <span className="text-indigo-400 font-bold">「☁️ 同步至試算表」</span> 即可！</p>
                                    </div>
                                </div>
                            </div>
                            
                            {/* 快速對照與狀態 */}
                            <div className="bg-white rounded-[2.5rem] p-8 border-2 border-slate-100 flex flex-col justify-center items-center text-center shadow-md group">
                                <div className="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 mb-4 shadow-sm"><Icons.Cloud /></div>
                                <h3 className="text-xl font-black mb-2 text-slate-800">試算表同步已就緒</h3>
                                <p className="text-slate-500 text-xs font-bold bg-slate-100 p-2 rounded-lg mt-2 mb-6 break-all w-full text-center">
                                    {GAS_URL.substring(0, 45)}...
                                </p>
                                <input type="text" placeholder="快速搜尋班級或代號..." className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-500 outline-none font-bold shadow-inner transition-all text-sm" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
                            </div>
                        </div>

                        {/* 名單預覽 */}
                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
                            {filteredData.map(i => (
                                <div key={i.id} className="p-4 bg-white border border-slate-200 rounded-2xl shadow-sm hover:shadow-md transition-all group active:scale-95">
                                    <span className="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md group-hover:bg-blue-600 group-hover:text-white transition-colors">{i.classroom}</span>
                                    <h4 className="text-lg font-black mt-1 text-slate-700 font-mono tracking-tight">{i.ssid}</h4>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* 分享成功提示 */}
                    {shared && (
                        <div className="fixed bottom-8 bg-indigo-600 text-white px-8 py-4 rounded-2xl shadow-2xl animate-in slide-in-from-bottom-4 flex items-center gap-3 font-bold z-[110]">
                            <Icons.Check /> 專屬分享連結已複製！傳給同學打開即可同步名單。
                        </div>
                    )}

                    {/* 匯入 Modal */}
                    {isImportModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-lg overflow-hidden shadow-2xl animate-in zoom-in-95 border-t-8 border-blue-600">
                                <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                                    <h4 className="text-xl font-black text-slate-800 flex items-center gap-2"><Icons.Upload /> 從 Excel 匯入清單</h4>
                                    <button onClick={()=>setIsImportModalOpen(false)} className="p-2 hover:bg-slate-200 rounded-full transition-colors text-slate-400"><Icons.X/></button>
                                </div>
                                <div className="p-6">
                                    <div className="bg-amber-50 border-2 border-amber-100 p-4 rounded-2xl mb-4 text-xs text-amber-800 font-bold leading-relaxed">
                                        💡 小技巧：在 Excel 中選取「班級」與「代號」兩欄並複製，然後直接貼到下方框中。
                                    </div>
                                    <textarea className="w-full h-40 p-4 bg-slate-50 rounded-2xl font-mono text-xs border-2 outline-none focus:border-blue-600 shadow-inner" placeholder="貼上 Excel 內容 (例如: 802班 101)..." value={importText} onChange={e=>{setImportText(e.target.value);setImportError('')}} />
                                    {importError && <p className="text-red-500 text-xs mt-2 font-black animate-shake flex items-center gap-1"><Icons.TriangleAlert /> {importError}</p>}
                                    <button onClick={()=>{setImportText("802班\t101\n806班\t121\n保健中心\t102");setImportError('')}} className="text-[10px] font-bold text-blue-600 mt-3 hover:underline flex items-center gap-1"><Icons.MousePointer2 /> 填入範例測試格式</button>
                                </div>
                                <div className="p-6 bg-slate-50 border-t flex gap-2">
                                    <button onClick={()=>{setData(DEFAULT_DATA);setIsImportModalOpen(false);localStorage.removeItem('fjm_wifi_v4');}} className="flex-1 py-4 rounded-xl font-bold text-slate-500 border bg-white hover:bg-slate-50 transition-all flex items-center justify-center gap-2"><Icons.RotateCcw /> 恢復預設</button>
                                    <button onClick={handleImport} className="flex-[2] py-4 rounded-xl font-black text-white bg-blue-600 shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">儲存並更新代碼</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
