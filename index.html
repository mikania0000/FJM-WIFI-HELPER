<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鳳甲國中 Wi-Fi 雲端直讀面板</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        // --- 內嵌 SVG 圖示 ---
        const Icons = {
            Wifi: () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h.01"/><path d="M2 8.82a15 15 0 0 1 20 0"/><path d="M5 12.859a10 10 0 0 1 14 0"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/></svg>,
            Smartphone: () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Zap: () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.7l11.4-12.2c.4-.4 1-.1 1 .4l-2 7.1H20l-11.4 12.2c-.4.4-1 .1-1-.4l2-7.1H4z"/></svg>,
            Cloud: () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.1-3.9-4.5a7 7 0 1 0-13.4 3C2.8 13.4 1 15.1 1 17.2 1 19.3 2.7 21 4.8 21h12.7c.3 0 .6-.1.9-.1V19z"/></svg>,
            Database: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>,
            TriangleAlert: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>,
            BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            HelpCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>,
            ExternalLink: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
        };

        // 這是作為介面尚未連上雲端時的最低限度版面
        const FALLBACK_DATA = [{ c: '載入中', s: 'FJM-載入中', p: '載入中' }];

        // Google Apps Script 網址 (請確認您已發佈為最新版本)
        const GAS_URL = "https://script.google.com/macros/s/AKfycby5AmcAwSnAOE-Khz9t2dCIzyHugcADSMKJYk4WQGbc3srurSMxIR8DcxNjd6tSchRy/exec";

        function App() {
            const [activeTab, setActiveTab] = useState('query'); // 'query' | 'tutorial'
            const [data, setData] = useState(FALLBACK_DATA);
            const [loading, setLoading] = useState(true);
            const [copiedBM, setCopiedBM] = useState(false);
            const [copiedPwdId, setCopiedPwdId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [fetchError, setFetchError] = useState('');

            // 網頁載入時從試算表抓取資料 (現在資料是根據「班級代號」動態生成的)
            useEffect(() => {
                fetch(GAS_URL)
                    .then(res => {
                        if (!res.ok) throw new Error("網路請求失敗，可能遭到阻擋");
                        return res.json();
                    })
                    .then(json => {
                        if(json.success && json.data && json.data.length > 0) {
                            setData(json.data);
                        } else {
                            setFetchError(json.error || "雲端資料為空。請確認試算表有建立「班級代號」分頁。");
                            setData([]); 
                        }
                        setLoading(false);
                    })
                    .catch(err => {
                        console.log("連線限制，載入備用名單", err);
                        setData(FALLBACK_DATA);
                        setFetchError("無法連線至雲端資料庫，請檢查 CORS 或重新部署 Apps Script。");
                        setLoading(false);
                    });
            }, []);

            // --- 產生書籤代碼 (動態根據 data 產生) ---
            const bookmarkletCode = useMemo(() => {
                // 將當前從試算表讀到的動態名單，打包進書籤中
                const compact = data.map(i => ({ s: i.s, c: i.c }));
                const coreScript = `(async function(){if(document.getElementById('fjm-root'))return;function l(s,g){return new Promise(r=>{if(window[g])return r();const t=document.createElement('script');t.src=s;t.onload=r;document.head.appendChild(t)})};await l('https://cdn.tailwindcss.com','tailwind');await l('https://unpkg.com/react@18/umd/react.production.min.js','React');await l('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js','ReactDOM');const rootDiv=document.createElement('div');rootDiv.id='fjm-root';rootDiv.style.cssText='position:fixed;inset:0;z-index:9999999;background:#f8fafc;overflow-y:auto;';document.body.appendChild(rootDiv);const{useState,useEffect,useMemo,createElement:e}=React;const DATA=${JSON.stringify(compact)};const GAS_LINK="${GAS_URL}";const getHP=(p)=>{if(!p||p==="尚未同步"||p==="無資料"||p==="讀取中..."||p==="暫無雲端資料"||p==="連線遭擋或超時")return p;return '••••••••••••'};const App=()=>{const[s,setS]=useState('');const[c,setC]=useState(null);const[d,setD]=useState(DATA.map(x=>({...x,p:"讀取中..."})));const[ld,setLd]=useState(true);const[err,setErr]=useState(null);const[st,setSt]=useState('idle');useEffect(()=>{fetch(GAS_LINK).then(r=>{if(!r.ok)throw new Error();return r.json()}).then(j=>{if(j.success&&j.data&&j.data.length>0){setD(j.data)}else{setD(DATA.map(x=>({...x,p:"暫無雲端資料"})))}setLd(false)}).catch(()=>{setD(DATA.map(x=>({...x,p:"連線遭擋或超時"})));setLd(false)})},[]);const doSync=async()=>{setSt('syncing');const res=[["教室","SSID","密碼","更新時間"]];for(const a of DATA){try{const r=await fetch("/api/qrcode_searching?ssid="+a.s);const j=await r.json();if(j.success&&j.data&&j.data.length>0){const p=j.data[0].ss_password.replace(/(.{4})/g,'$1 ').trim();res.push([a.c,a.s,p,new Date().toLocaleString()]);}}catch(e){}}try{await fetch(GAS_LINK,{method:"POST",mode:"no-cors",body:JSON.stringify({data:res})});setSt('done');setTimeout(()=>{setSt('idle');fetch(GAS_LINK).then(r=>r.json()).then(j=>{if(j.success)setD(j.data)})},3000)}catch(e){setSt('error')}};const f=useMemo(()=>!s.trim()?d:d.filter(i=>i.s.toLowerCase().includes(s.toLowerCase())||i.c.includes(s)),[s,d]);return e('div',{className:"p-6 max-w-4xl mx-auto font-sans text-slate-900"},e('div',{className:"flex flex-wrap justify-between items-center gap-4 mb-6"},e('h1',{className:"text-3xl font-black text-blue-600"},"FJM 雲端直讀版"),e('div',{className:"flex gap-2"},e('button',{onClick:doSync,className:"px-6 py-3 bg-indigo-600 hover:bg-indigo-700 transition-colors text-white rounded-xl font-bold text-base shadow-md"},st==='syncing'?'⏳ 正在抓取中...':st==='done'?'✅ 已推送至試算表':st==='error'?'❌ 同步失敗':'☁️ 同步至試算表'),e('button',{onClick:()=>document.getElementById('fjm-root').remove(),className:"text-slate-500 font-bold px-4 py-3 hover:bg-slate-200 rounded-xl text-base"},"關閉 ✕"))),e('input',{className:"w-full p-5 rounded-2xl border-2 mb-6 shadow-sm outline-none focus:border-blue-500 font-bold text-xl",placeholder:"搜尋班級...",value:s,onChange:ev=>setS(ev.target.value)}),err?e('div',{className:"mb-4 text-lg font-bold text-red-500 bg-red-50 p-4 rounded-2xl border border-red-100"},err):null,ld?e('div',{className:"text-center py-10 font-bold text-blue-500 animate-pulse text-2xl"},"☁️ 正在從 Google 試算表載入資料..."):e('div',{className:"grid gap-5 md:grid-cols-2 font-sans"},f.map(i=>{const dp=getHP(i.p);const canCopy=i.p&&i.p!=="尚未同步"&&i.p!=="無資料"&&i.p!=="讀取中..."&&i.p!=="暫無雲端資料"&&i.p!=="連線遭擋或超時";const cp=(p)=>{if(!canCopy)return;const clean=p.replace(/\\s+/g,'');const ta=document.createElement('textarea');ta.value=clean;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);setC(i.s);setTimeout(()=>setC(null),2000)};return e('div',{key:i.s,className:"p-6 bg-white rounded-[2rem] border shadow-sm flex flex-col"},e('div',{className:"flex justify-between items-start mb-3"},e('span',{className:"text-base font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg"},i.c),e('h3',{className:"text-2xl font-black text-slate-500 font-mono"},i.s)),e('div',{className:"mt-auto bg-slate-50 p-4 rounded-2xl border border-slate-100 flex justify-between items-center"},e('div',{className:"flex-1"},e('div',{className:"flex items-center gap-2 mb-1"},e('p',{className:"text-sm text-slate-500 font-bold uppercase"},"Wifi Password")),e('p',{className:"font-mono text-3xl font-black text-slate-900 tracking-tight py-1"},dp||'無資料')),canCopy&&e('button',{onClick:()=>cp(i.p),className:"px-6 py-4 rounded-2xl text-white font-bold bg-blue-600 shadow-md active:scale-95 text-xl flex items-center gap-2 ml-4 shrink-0"},c===i.s?'已複製':'複製密碼')))})))};ReactDOM.createRoot(rootDiv).render(e(App))})()`;
                return `javascript:void(${coreScript})`;
            }, [data]);

            const handleCopyBookmarklet = () => {
                const ta = document.createElement("textarea");
                ta.value = bookmarkletCode;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                setCopiedBM(true);
                setTimeout(() => setCopiedBM(false), 5000);
            };

            const handleCopyPassword = (pwd, id) => {
                if (!pwd || pwd === "尚未同步" || pwd === "無資料") return;
                const cleanPwd = pwd.replace(/\s+/g, '');
                const ta = document.createElement("textarea");
                ta.value = cleanPwd;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                
                setCopiedPwdId(id);
                setTimeout(() => setCopiedPwdId(null), 2000);
            };

            const filteredData = useMemo(() => {
                const kw = searchTerm.toLowerCase();
                return searchTerm.trim() ? data.filter(i => (i.s || '').toLowerCase().includes(kw) || (i.c || '').includes(kw)) : data;
            }, [searchTerm, data]);

            return (
                <div className="min-h-screen w-full flex flex-col items-center bg-slate-50 font-sans pb-20">
                    
                    <nav className="w-full bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="text-blue-600 bg-blue-50 p-2 rounded-xl"><Icons.Cloud /></div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tighter uppercase leading-none">FJM Cloud</h1>
                                <p className="text-sm font-bold text-blue-600 tracking-widest uppercase mt-1">Wi-Fi 動態查詢系統</p>
                            </div>
                        </div>
                        <a href="https://docs.google.com/spreadsheets/d/1LomQabtIlrmMnT0TxKCAectvxiINlMDnEc6QvZCEMbk/edit" target="_blank" className="flex items-center gap-2 p-3 bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition-all shadow-sm text-base font-bold border border-slate-200">
                            <Icons.Database /> <span className="hidden sm:inline">編輯班級代號</span>
                        </a>
                    </nav>

                    <main className="w-full max-w-5xl px-4 md:px-6 py-8">
                        
                        <div className="flex space-x-3 mb-10 bg-slate-200/50 p-2 rounded-2xl w-full max-w-lg mx-auto">
                            <button 
                                onClick={() => setActiveTab('query')} 
                                className={`flex-1 py-4 px-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-all ${activeTab === 'query' ? 'bg-white text-blue-600 shadow-md' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                <Icons.Search /> 查詢密碼
                            </button>
                            <button 
                                onClick={() => setActiveTab('tutorial')} 
                                className={`flex-1 py-4 px-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-all ${activeTab === 'tutorial' ? 'bg-white text-blue-600 shadow-md' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                <Icons.Smartphone /> 安裝教學
                            </button>
                        </div>

                        {activeTab === 'query' && (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-white rounded-[3rem] p-8 md:p-12 border border-slate-200 shadow-xl relative min-h-[60vh]">
                                    
                                    <div className="mb-12 max-w-3xl mx-auto">
                                        <div className="relative group">
                                            <div className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors">
                                                <Icons.Search />
                                            </div>
                                            <input 
                                                type="text" 
                                                placeholder="搜尋班級或代號..." 
                                                className="w-full pl-16 pr-6 py-6 rounded-2xl bg-slate-50 border-2 border-slate-100 focus:border-blue-500 focus:bg-white outline-none font-black text-xl transition-all shadow-inner placeholder:font-bold placeholder:text-slate-400 text-slate-800"
                                                value={searchTerm} 
                                                onChange={e=>setSearchTerm(e.target.value)} 
                                                autoFocus
                                            />
                                        </div>
                                    </div>

                                    {fetchError && !loading && (
                                        <div className="mb-10 max-w-3xl mx-auto bg-red-50 border border-red-200 p-5 rounded-2xl flex items-start gap-4 animate-in fade-in">
                                            <div className="text-red-500 shrink-0 w-6 h-6 mt-1"><Icons.TriangleAlert /></div>
                                            <div>
                                                <p className="text-lg font-bold text-red-800 mb-2">資料庫連接異常</p>
                                                <p className="text-base text-red-600 leading-relaxed font-medium">{fetchError}</p>
                                            </div>
                                        </div>
                                    )}

                                    {loading ? (
                                        <div className="py-32 text-center text-blue-500 font-bold animate-pulse flex flex-col items-center gap-6">
                                            <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center"><Icons.Cloud /></div>
                                            <span className="text-2xl">正在讀取「班級代號」對應表...</span>
                                        </div>
                                    ) : (
                                        <div>
                                            <div className="flex justify-between items-end mb-8 border-b border-slate-100 pb-5">
                                                <p className="text-xl font-black text-slate-800 flex items-center gap-3">
                                                    <Icons.BookOpen /> 全校節點列表
                                                </p>
                                                <p className="text-base text-slate-500 font-bold bg-slate-100 px-4 py-2 rounded-xl">共載入 {filteredData.length} 筆對應</p>
                                            </div>
                                            
                                            {filteredData.length > 0 ? (
                                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                                    {filteredData.map(i => {
                                                        const currentId = i.s;
                                                        const isCopied = copiedPwdId === currentId;
                                                        const pwdText = i.p || "尚未讀取";
                                                        const canCopy = pwdText !== "尚未同步" && pwdText !== "無資料";
                                                        const displayPwdText = canCopy ? '••••••••••••' : pwdText;

                                                        return (
                                                            <div key={currentId} className="bg-slate-50 border border-slate-100 rounded-[2rem] p-6 hover:bg-white hover:border-blue-300 hover:shadow-xl transition-all group flex flex-col justify-between">
                                                                <div className="flex justify-between items-center mb-5">
                                                                    <span className="text-base font-black text-blue-600 bg-blue-100 px-4 py-1.5 rounded-lg tracking-widest">{i.c}</span>
                                                                    <span className="text-xl font-black text-slate-400 group-hover:text-blue-500 transition-colors font-mono">{currentId}</span>
                                                                </div>
                                                                <div className="bg-white border border-slate-200 p-4 rounded-2xl flex justify-between items-center">
                                                                    <div className="flex-1">
                                                                        <div className="flex items-center gap-2 mb-2">
                                                                            <p className="text-sm font-black text-slate-400 uppercase tracking-widest">Password</p>
                                                                        </div>
                                                                        <p className={`font-mono text-3xl font-black tracking-tight py-1 ${canCopy ? 'text-slate-800' : 'text-slate-300'}`}>
                                                                            {displayPwdText}
                                                                        </p>
                                                                    </div>
                                                                    {canCopy && (
                                                                        <button 
                                                                            onClick={() => handleCopyPassword(pwdText, currentId)}
                                                                            className={`p-4 ml-4 shrink-0 rounded-xl flex items-center justify-center transition-all active:scale-90 ${isCopied ? 'bg-green-100 text-green-600' : 'bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white'}`}
                                                                            title="複製密碼"
                                                                        >
                                                                            {isCopied ? <Icons.Check /> : <Icons.Copy />}
                                                                        </button>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ) : (
                                                <div className="py-24 text-center text-slate-400 font-black border-4 border-dashed border-slate-50 rounded-[3rem]">
                                                    <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.HelpCircle /></div>
                                                    <span className="text-2xl">找不到符合的班級或代號</span>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'tutorial' && (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <section className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-[3rem] p-10 md:p-14 text-white mb-10 shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-80 h-80 opacity-10 translate-x-1/4 -translate-y-1/4"><Icons.Database /></div>
                                    <div className="relative z-10">
                                        <span className="bg-white/20 px-4 py-1.5 rounded-full text-sm font-bold uppercase tracking-widest mb-6 inline-block border border-white/30 backdrop-blur-sm">
                                            完全動態對應
                                        </span>
                                        <h2 className="text-4xl md:text-5xl font-black mb-8 tracking-tight leading-tight">
                                            名單換了？<br />改試算表就好。
                                        </h2>
                                        <p className="text-blue-100 text-xl mb-10 font-medium opacity-90 max-w-xl leading-relaxed">
                                            此版本已經與您的試算表「班級代號」綁定！只要複製一次書籤，未來即使班級對應換了，外掛也能自動讀取最新對應表來同步密碼。
                                        </p>
                                        <button onClick={handleCopyBookmarklet} className={`w-full sm:w-auto px-10 py-6 rounded-[1.5rem] font-black text-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-4 ${copiedBM ? 'bg-green-500' : 'bg-white text-blue-600 hover:bg-blue-50'}`}>
                                            {copiedBM ? <Icons.Check /> : <Icons.Zap />}
                                            {copiedBM ? '啟動碼已複製！去更新書籤吧' : '複製動態版外掛代碼'}
                                        </button>
                                    </div>
                                </section>

                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="bg-slate-900 rounded-[2.5rem] p-10 text-white shadow-xl">
                                        <h3 className="text-3xl font-black mb-8 flex items-center gap-3"><Icons.Smartphone className="text-blue-400 w-10 h-10" /> 如何執行同步？</h3>
                                        <div className="space-y-8 text-lg opacity-90 font-medium">
                                            <div className="flex gap-5 items-start">
                                                <b className="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center flex-shrink-0 font-black shadow-lg shadow-blue-500/30">1</b>
                                                <p className="pt-1.5 text-slate-300">打開手機或電腦瀏覽器，設定一個名為「啟動」的書籤，網址貼上您剛複製的代碼。</p>
                                            </div>
                                            <div className="flex gap-5 items-start">
                                                <b className="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center flex-shrink-0 font-black shadow-lg shadow-blue-500/30">2</b>
                                                <p className="pt-1.5 text-slate-300">
                                                    在學校打開 <a href="https://wifi-auth.kh.edu.tw/qrcode_searching" target="_blank" className="text-indigo-400 font-bold underline underline-offset-4 hover:text-indigo-300 transition-colors">教育局網頁</a>，點擊該「啟動」書籤。
                                                </p>
                                            </div>
                                            <div className="flex gap-5 items-start">
                                                <b className="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center flex-shrink-0 font-black shadow-lg shadow-indigo-500/30">3</b>
                                                <p className="pt-1 text-slate-300">
                                                    點擊介面上方的 <span className="text-indigo-400 font-bold">「☁️ 同步至試算表」</span>，外掛就會根據最新的「班級代號」把密碼抓齊並丟到雲端。
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-amber-50 rounded-[2.5rem] p-10 border-2 border-amber-100 flex flex-col justify-center shadow-md">
                                        <div className="w-20 h-20 bg-amber-200 text-amber-700 rounded-2xl flex items-center justify-center mb-8"><Icons.Cloud /></div>
                                        <h3 className="text-3xl font-black text-amber-900 mb-6">如果班級對應換了？</h3>
                                        <p className="text-xl text-amber-800 leading-relaxed font-medium mb-8">
                                            完全不用改程式碼！只要進到您的 Google 試算表，把「班級代號」那一頁的內容更新即可。
                                        </p>
                                        <div className="bg-white p-6 rounded-2xl border border-amber-200">
                                            <p className="text-lg font-bold text-slate-700 mb-3">更新對應表注意事項：</p>
                                            <ul className="text-base text-slate-500 leading-relaxed list-disc pl-5 space-y-2">
                                                <li>第一欄放 <b>教室編號</b> (例如: #126)。</li>
                                                <li>第二欄放 <b>班級名稱</b> (例如: 701，程式會自動補「班」字，或直接寫 保健中心)。</li>
                                                <li>改完後，需要重新把這份網頁複製成外掛，在學校網頁點擊一次 <b>☁️ 同步至試算表</b> 即可！</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
